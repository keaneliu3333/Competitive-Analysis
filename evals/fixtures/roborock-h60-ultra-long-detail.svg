  <text x="86" y="434" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#17352d">Top priority selling points</text>
  <text x="110" y="484" font-family="Arial, sans-serif" font-size="21" fill="#17352d">P1: Up to 210AW suction power for cordless cleaning.</text>
  <text x="110" y="530" font-family="Arial, sans-serif" font-size="21" fill="#17352d">P2: Flexible and bendable wand plus multiple tools and accessories.</text>
  <text x="110" y="576" font-family="Arial, sans-serif" font-size="21" fill="#17352d">P3: Anti-tangle brush, green light detection, 5-stage filtration and cyclone separation.</text>
  <text x="86" y="660" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#17352d">Parameter evidence</text>
  <text x="110" y="708" font-family="Arial, sans-serif" font-size="20" fill="#426159">Category: cordless stick vacuum cleaner</text>
  <text x="110" y="748" font-family="Arial, sans-serif" font-size="20" fill="#426159">Cleaning ability: suction power, anti-tangle brush and centered green-light dust detection</text>
  <text x="110" y="788" font-family="Arial, sans-serif" font-size="20" fill="#426159">Maintenance: filtration and 9-cyclone dust separation are key extraction fields.</text>
