<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1450" viewBox="0 0 900 1450">
  <rect width="900" height="1450" fill="#f7faf8"/>
  <rect x="48" y="48" width="804" height="1354" rx="18" fill="#ffffff" stroke="#d8e1dc"/>
  <text x="86" y="120" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17352d">Tineco FLOOR ONE S7 PRO</text>
  <text x="86" y="166" font-family="Arial, sans-serif" font-size="20" fill="#426159">Review-backed floor washer detail fixture</text>
  <text x="86" y="220" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#17352d">Source</text>
  <text x="86" y="258" font-family="Arial, sans-serif" font-size="18" fill="#426159">https://www.architecturaldigest.com/story/i-tried-it-the-tineco-floor-one-s7-pro</text>
  <text x="86" y="326" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#17352d">Top priority selling points</text>
  <text x="110" y="376" font-family="Arial, sans-serif" font-size="21" fill="#17352d">P1: iLoop smart sensor adjusts suction, brush speed and water dispensing.</text>
  <text x="110" y="422" font-family="Arial, sans-serif" font-size="21" fill="#17352d">P2: SmoothPower self-propulsion improves handling despite heavier wet/dry body.</text>
  <text x="110" y="468" font-family="Arial, sans-serif" font-size="21" fill="#17352d">P3: Self-cleaning, LCD guidance, voice prompts and dual-sided edge cleaning.</text>
  <text x="86" y="552" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#17352d">Parameter evidence</text>
  <text x="110" y="600" font-family="Arial, sans-serif" font-size="20" fill="#426159">Runtime: review reports 40 minutes in auto mode and 28 minutes in max mode.</text>
  <text x="110" y="640" font-family="Arial, sans-serif" font-size="20" fill="#426159">Water tanks: clean water and dirty water tanks are called out as separate tanks.</text>
  <text x="110" y="680" font-family="Arial, sans-serif" font-size="20" fill="#426159">Usage feel: easy maneuvering, self-propelled movement, simple controls and guided screen.</text>
  <text x="110" y="720" font-family="Arial, sans-serif" font-size="20" fill="#426159">Limitations: not multi-surface and considered pricey in the review.</text>
</svg>
